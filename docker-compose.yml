services:
  app:
    build: .
    restart: unless-stopped
    environment:
      # SQLite database lives on a named volume (absolute path inside container).
      DATABASE_URL: "file:/data/uwrtrainer.db"
      # Required. Generate with: openssl rand -base64 32  (set in .env)
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET in your .env}"
      # Optional: invite code required to sign up (recommended on a public URL).
      REGISTRATION_CODE: "${REGISTRATION_CODE:-}"
      # Optional outbound email (verification + password reset). Empty SMTP_HOST
      # disables the whole email feature gracefully (see .env.example).
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MAIL_FROM: "${MAIL_FROM:-}"
      APP_URL: "${APP_URL:-}"
      NODE_ENV: "production"
    volumes:
      - db-data:/data
    # Exposed on localhost only. Point Tailscale Funnel (or your own reverse
    # proxy) at this port. Host port is configurable via APP_PORT in .env.
    # 3000 is unprivileged, so this works fine under rootless Docker.
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"

  # OPTIONAL built-in HTTPS via Caddy, for exposing a public domain directly
  # (NOT needed with Tailscale Funnel, which provides TLS itself).
  # Start it with:  docker compose --profile caddy up -d --build
  # Under rootless Docker, binding 80/443 needs extra setup — override with
  # HTTP_PORT/HTTPS_PORT (e.g. 8080/8443) if you can't use privileged ports.
  caddy:
    image: caddy:2
    profiles: ["caddy"]
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: "${APP_DOMAIN:-localhost}"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
